# UR5 机械臂配置
robot_name: "UR5"
num_joints: 6

# 标准参数参考值（参考theta_ref）
# 对于每个joint，参数结构为：[m, x_com, y_com, z_com, I_xx, I_yy, I_zz, f_v, f_s]
# m: 质量 (kg)
# x_com, y_com, z_com: 质心位置 (m)
# I_xx, I_yy, I_zz: 转动惯量 (kg*m^2)
# f_v: 粘性摩擦 (N*s/rad)
# f_s: 库伦摩擦 (N*m)

reference_parameters:
  joint_1:
    mass: 3.7
    com: [0, 0, 0.1]
    inertia: [0.010, 0.010, 0.005]
    damping: 0.5
    friction: 0.5
  
  joint_2:
    mass: 8.393
    com: [0.2125, 0, 0]
    inertia: [0.220, 0.220, 0.05]
    damping: 0.5
    friction: 0.5
  
  joint_3:
    mass: 2.275
    com: [0.2, 0, 0]
    inertia: [0.05, 0.05, 0.01]
    damping: 0.3
    friction: 0.3
  
  joint_4:
    mass: 1.219
    com: [0, 0, 0]
    inertia: [0.008, 0.008, 0.005]
    damping: 0.2
    friction: 0.2
  
  joint_5:
    mass: 1.219
    com: [0, 0, 0]
    inertia: [0.008, 0.008, 0.005]
    damping: 0.2
    friction: 0.2
  
  joint_6:
    mass: 0.5
    com: [0, 0, 0.05]
    inertia: [0.001, 0.001, 0.001]
    damping: 0.1
    friction: 0.1

# 关节限制
joint_limits:
  - joint_name: "joint_1"
    lower: -3.14159
    upper: 3.14159
    velocity: 3.14159
    effort: 150
  
  - joint_name: "joint_2"
    lower: -3.14159
    upper: 3.14159
    velocity: 3.14159
    effort: 150
  
  - joint_name: "joint_3"
    lower: -3.14159
    upper: 3.14159
    velocity: 3.14159
    effort: 100
  
  - joint_name: "joint_4"
    lower: -3.14159
    upper: 3.14159
    velocity: 3.14159
    effort: 60
  
  - joint_name: "joint_5"
    lower: -3.14159
    upper: 3.14159
    velocity: 3.14159
    effort: 60
  
  - joint_name: "joint_6"
    lower: -3.14159
    upper: 3.14159
    velocity: 3.14159
    effort: 60

# 辨识配置
identification:
  method: "weighted_least_squares"  # 可选：least_squares, weighted_least_squares, ridge
  regularization_lambda: 0.001
  use_joint_friction: true
  use_gravity: true
